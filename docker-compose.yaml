services:
  example:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    ports:
      - "8888:8888"
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=example.settings

  tests:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - PYENV_ROOT=/opt/pyenv
    command: >
      sh -c "msgfmt tests/locale/pt_BR/LC_MESSAGES/django.po
      -o tests/locale/pt_BR/LC_MESSAGES/django.mo
      && poetry run tests"
